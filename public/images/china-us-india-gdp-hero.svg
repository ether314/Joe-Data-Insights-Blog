<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1629"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="usFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3685BF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3685BF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cnFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DB704B" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#DB704B" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="inFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F8A65" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1F8A65" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="600" y="48" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="28" font-weight="700">China, US &amp; India  30 Years of GDP</text>
  <text x="600" y="78" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="16">Constant 2025 US dollars � 19952026</text>

  <!-- grid -->
  <g stroke="#334155" stroke-width="1" opacity="0.5">
    <line x1="100" y1="520" x2="1100" y2="520"/>
    <line x1="100" y1="440" x2="1100" y2="440"/>
    <line x1="100" y1="360" x2="1100" y2="360"/>
    <line x1="100" y1="280" x2="1100" y2="280"/>
    <line x1="100" y1="200" x2="1100" y2="200"/>
    <line x1="100" y1="120" x2="1100" y2="120"/>
  </g>
  <text x="88" y="524" text-anchor="end" fill="#64748b" font-family="system-ui" font-size="12">$0T</text>
  <text x="88" y="204" text-anchor="end" fill="#64748b" font-family="system-ui" font-size="12">$30T</text>

  <!-- US line (blue) - y scale: 0-35T maps 520-100 -->
  <path d="M100,498 L154,492 L208,486 L262,478 L316,468 L370,456 L424,430 L478,380 L532,340 L586,310 L640,290 L694,270 L748,255 L802,240 L856,225 L910,210 L964,200 L1018,192 L1072,185 L1100,180" fill="url(#usFill)" stroke="none"/>
  <path d="M100,498 L154,492 L208,486 L262,478 L316,468 L370,456 L424,430 L478,380 L532,340 L586,310 L640,290 L694,270 L748,255 L802,240 L856,225 L910,210 L964,200 L1018,192 L1072,185 L1100,180" fill="none" stroke="#3685BF" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- China line (orange) -->
  <path d="M100,512 L154,510 L208,508 L262,505 L316,498 L370,485 L424,455 L478,400 L532,350 L586,310 L640,285 L694,265 L748,250 L802,240 L856,232 L910,225 L964,218 L1018,212 L1072,208 L1100,205" fill="url(#cnFill)" stroke="none"/>
  <path d="M100,512 L154,510 L208,508 L262,505 L316,498 L370,485 L424,455 L478,400 L532,350 L586,310 L640,285 L694,265 L748,250 L802,240 L856,232 L910,225 L964,218 L1018,212 L1072,208 L1100,205" fill="none" stroke="#DB704B" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- India line (green) -->
  <path d="M100,515 L154,514 L208,513 L262,512 L316,510 L370,507 L424,500 L478,490 L532,475 L586,460 L640,445 L694,430 L748,420 L802,410 L856,400 L910,390 L964,380 L1018,370 L1072,365 L1100,362" fill="url(#inFill)" stroke="none"/>
  <path d="M100,515 L154,514 L208,513 L262,512 L316,510 L370,507 L424,500 L478,490 L532,475 L586,460 L640,445 L694,430 L748,420 L802,410 L856,400 L910,390 L964,380 L1018,370 L1072,365 L1100,362" fill="none" stroke="#1F8A65" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- year labels -->
  <text x="100" y="550" text-anchor="middle" fill="#64748b" font-size="11">1995</text>
  <text x="370" y="550" text-anchor="middle" fill="#64748b" font-size="11">2005</text>
  <text x="640" y="550" text-anchor="middle" fill="#64748b" font-size="11">2015</text>
  <text x="910" y="550" text-anchor="middle" fill="#64748b" font-size="11">2024</text>
  <text x="1100" y="550" text-anchor="middle" fill="#64748b" font-size="11">2026*</text>

  <!-- legend -->
  <rect x="820" y="95" width="280" height="90" rx="8" fill="#1e293b" stroke="#334155"/>
  <circle cx="845" cy="120" r="6" fill="#3685BF"/>
  <text x="860" y="124" fill="#e2e8f0" font-size="14" font-family="system-ui">United States  $31.3T (2026)</text>
  <circle cx="845" cy="148" r="6" fill="#DB704B"/>
  <text x="860" y="152" fill="#e2e8f0" font-size="14" font-family="system-ui">China  $20.2T (64% of US)</text>
  <circle cx="845" cy="176" r="6" fill="#1F8A65"/>
  <text x="860" y="180" fill="#e2e8f0" font-size="14" font-family="system-ui">India  $4.0T (rising fast)</text>

  <!-- stat callouts -->
  <rect x="100" y="580" width="320" height="70" rx="8" fill="#1e293b" stroke="#DB704B" stroke-width="1"/>
  <text x="260" y="608" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="system-ui">CHINA GDP GROWTH SINCE 1995</text>
  <text x="260" y="636" text-anchor="middle" fill="#DB704B" font-size="26" font-weight="700" font-family="system-ui">+1,192%</text>

  <rect x="440" y="580" width="320" height="70" rx="8" fill="#1e293b" stroke="#3685BF" stroke-width="1"/>
  <text x="600" y="608" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="system-ui">CHINA AS % OF US GDP</text>
  <text x="600" y="636" text-anchor="middle" fill="#3685BF" font-size="26" font-weight="700" font-family="system-ui">9.7% � 64.4%</text>

  <rect x="780" y="580" width="320" height="70" rx="8" fill="#1e293b" stroke="#1F8A65" stroke-width="1"/>
  <text x="940" y="608" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="system-ui">INDIA GDP GROWTH SINCE 1995</text>
  <text x="940" y="636" text-anchor="middle" fill="#1F8A65" font-size="26" font-weight="700" font-family="system-ui">+428%</text>

  <text x="600" y="668" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui">*20252026 IMF estimates � Source: World Bank WDI, US CPI, IMF WEO April 2026</text>
</svg>
