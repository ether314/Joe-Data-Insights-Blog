<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <rect width="1200" height="500" fill="#f8fafc"/>
  <text x="600" y="40" text-anchor="middle" fill="#0f172a" font-family="system-ui,sans-serif" font-size="22" font-weight="700">China Closing the Gap  GDP as % of United States</text>
  <text x="600" y="68" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="14">Constant 2025 US dollars � 19952026</text>

  <!-- 50% reference -->
  <line x1="80" y1="250" x2="1120" y2="250" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="1128" y="254" fill="#f59e0b" font-size="12" font-family="system-ui" font-weight="600">50%</text>

  <!-- area fill -->
  <path d="M80,420 L120,418 L160,415 L200,408 L240,395 L280,375 L320,340 L360,290 L400,240 L440,210 L480,195 L520,185 L560,178 L600,172 L640,168 L680,165 L720,163 L760,162 L800,161 L840,160 L880,159 L920,158 L960,157 L1000,156 L1040,155 L1080,154 L1120,153 L1120,420 L80,420 Z" fill="#DB704B" fill-opacity="0.15"/>

  <!-- line -->
  <path d="M80,420 L120,418 L160,415 L200,408 L240,395 L280,375 L320,340 L360,290 L400,240 L440,210 L480,195 L520,185 L560,178 L600,172 L640,168 L680,165 L720,163 L760,162 L800,161 L840,160 L880,159 L920,158 L960,157 L1000,156 L1040,155 L1080,154 L1120,153" fill="none" stroke="#DB704B" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- milestone dots -->
  <circle cx="80" cy="420" r="7" fill="#DB704B"/>
  <text x="80" y="445" text-anchor="middle" fill="#64748b" font-size="11">1995 � 9.7%</text>
  <circle cx="400" cy="240" r="7" fill="#DB704B"/>
  <text x="400" y="225" text-anchor="middle" fill="#64748b" font-size="11">2010 � 41%</text>
  <circle cx="720" cy="163" r="7" fill="#DB704B"/>
  <text x="720" y="148" text-anchor="middle" fill="#64748b" font-size="11">2020 � 70%</text>
  <circle cx="1120" cy="153" r="7" fill="#DB704B"/>
  <text x="1120" y="138" text-anchor="middle" fill="#64748b" font-size="11">2026 � 64%</text>

  <!-- y axis labels -->
  <text x="70" y="424" text-anchor="end" fill="#64748b" font-size="11">10%</text>
  <text x="70" y="254" text-anchor="end" fill="#64748b" font-size="11">50%</text>
  <text x="70" y="124" text-anchor="end" fill="#64748b" font-size="11">90%</text>

  <rect x="80" y="460" width="1040" height="24" rx="4" fill="#0f1629"/>
  <text x="600" y="477" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="system-ui">China crossed 50% of US GDP around 20112012. Per-capita parity remains decades away.</text>
</svg>
