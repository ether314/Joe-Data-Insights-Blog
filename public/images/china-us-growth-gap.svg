<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" fill="none">
  <rect width="1200" height="520" fill="#0f1629"/>
  <text x="600" y="42" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="22" font-weight="700">Growth Rate Face-Off  Who Outpaced Whom?</text>
  <text x="600" y="68" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14">Year-over-year GDP growth gap vs China (percentage points) � 19962026</text>

  <!-- zero line -->
  <line x1="80" y1="280" x2="1120" y2="280" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="70" y="284" text-anchor="end" fill="#f59e0b" font-size="11" font-weight="600">0</text>

  <!-- US - China gap bars (sample years) blue above zero = US faster -->
  <g>
    <rect x="95" y="200" width="28" height="80" fill="#3685BF" rx="2"/>
    <rect x="195" y="220" width="28" height="60" fill="#3685BF" rx="2"/>
    <rect x="295" y="180" width="28" height="100" fill="#3685BF" rx="2"/>
    <rect x="395" y="320" width="28" height="40" fill="#DB704B" rx="2"/>
    <rect x="495" y="350" width="28" height="70" fill="#DB704B" rx="2"/>
    <rect x="595" y="240" width="28" height="40" fill="#DB704B" rx="2"/>
    <rect x="695" y="300" width="28" height="20" fill="#DB704B" rx="2"/>
    <rect x="795" y="260" width="28" height="20" fill="#DB704B" rx="2"/>
    <rect x="895" y="250" width="28" height="30" fill="#DB704B" rx="2"/>
    <rect x="995" y="270" width="28" height="10" fill="#DB704B" rx="2"/>
    <rect x="1095" y="265" width="28" height="15" fill="#DB704B" rx="2"/>
  </g>

  <!-- India - China gap bars green -->
  <g opacity="0.85">
    <rect x="125" y="290" width="28" height="30" fill="#1F8A65" rx="2"/>
    <rect x="225" y="285" width="28" height="25" fill="#1F8A65" rx="2"/>
    <rect x="325" y="295" width="28" height="35" fill="#1F8A65" rx="2"/>
    <rect x="425" y="270" width="28" height="10" fill="#1F8A65" rx="2"/>
    <rect x="525" y="250" width="28" height="30" fill="#1F8A65" rx="2"/>
    <rect x="625" y="255" width="28" height="25" fill="#1F8A65" rx="2"/>
    <rect x="725" y="240" width="28" height="40" fill="#1F8A65" rx="2"/>
    <rect x="825" y="235" width="28" height="45" fill="#1F8A65" rx="2"/>
    <rect x="925" y="230" width="28" height="50" fill="#1F8A65" rx="2"/>
    <rect x="1025" y="245" width="28" height="35" fill="#1F8A65" rx="2"/>
    <rect x="1125" y="250" width="28" height="30" fill="#1F8A65" rx="2"/>
  </g>

  <!-- x labels -->
  <text x="109" y="420" text-anchor="middle" fill="#64748b" font-size="10">2000</text>
  <text x="409" y="420" text-anchor="middle" fill="#64748b" font-size="10">2008</text>
  <text x="709" y="420" text-anchor="middle" fill="#64748b" font-size="10">2018</text>
  <text x="1109" y="420" text-anchor="middle" fill="#64748b" font-size="10">2026</text>

  <!-- legend -->
  <rect x="380" y="450" width="440" height="52" rx="8" fill="#1e293b" stroke="#334155"/>
  <rect x="400" y="468" width="14" height="14" rx="2" fill="#3685BF"/>
  <text x="422" y="480" fill="#e2e8f0" font-size="13" font-family="system-ui">US  China (above zero = US faster)</text>
  <rect x="680" y="468" width="14" height="14" rx="2" fill="#1F8A65"/>
  <text x="702" y="480" fill="#e2e8f0" font-size="13" font-family="system-ui">India  China</text>

  <!-- stats row -->
  <text x="200" y="120" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">AVG CHINA  US (30 YR)</text>
  <text x="200" y="148" text-anchor="middle" fill="#DB704B" font-size="24" font-weight="700" font-family="system-ui">+5.8 pp</text>
  <text x="600" y="120" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">AVG INDIA  US (30 YR)</text>
  <text x="600" y="148" text-anchor="middle" fill="#1F8A65" font-size="24" font-weight="700" font-family="system-ui">+3.2 pp</text>
  <text x="1000" y="120" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">AVG CHINA  INDIA (30 YR)</text>
  <text x="1000" y="148" text-anchor="middle" fill="#f59e0b" font-size="24" font-weight="700" font-family="system-ui">+2.6 pp</text>
</svg>
